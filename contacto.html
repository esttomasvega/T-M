/* Botones de WhatsApp */

.whatsapp-btn {

    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    margin-top: 10px;
    transition: 0.3s;
}

.whatsapp-btn:hover {
    background: #1ebe5d;
    transform: scale(1.05);
}


/* Botón flotante de WhatsApp */

.whatsapp-float {
    position: fixed;
    width: 65px;
    height: 65px;
    bottom: 25px;
    right: 25px;
    background-color: #25D366;
    color: white;
    border-radius: 50%;
    text-align: center;
    font-size: 32px;
    line-height: 65px;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 1000;
    transition: 0.3s;
}

.whatsapp-float:hover {
    background-color: #1ebe5d;
    transform: scale(1.1);
}


/* Diseño de contactos */

.contacto-box {
    text-align: center;
    padding: 20px;
}

    color: inherit;
